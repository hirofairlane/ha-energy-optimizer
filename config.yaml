name: "Energy Optimizer"
description: "Smart energy management: solar battery, heat pump, pool pump, pool cleaner and dishwasher with ML + adaptive tariff rules."
version: "2.1.0"
slug: "energy_optimizer"
init: false
arch:
  - aarch64
  - amd64
  - armv7

homeassistant_api: true
auth_api: true
ingress: true
ingress_port: 8765
panel_icon: "mdi:solar-power-variant"
panel_title: "Energy Optimizer"

map:
  - type: homeassistant_config
    read_only: true

options:
  # ── General ────────────────────────────────────────────────────────────────
  decision_interval_minutes: 15
  retrain_cron: "0 3 * * *"
  log_level: "info"

  # ── Seasons ────────────────────────────────────────────────────────────────
  summer_start_month: 6
  summer_end_month: 9

  # ── Battery thresholds ─────────────────────────────────────────────────────
  solar_tomorrow_irrisoria_kwh: 2.0
  battery_emergency_threshold: 10
  battery_low_threshold: 30
  battery_medium_threshold: 50
  battery_storm_threshold: 80
  battery_capacity_kwh: 10.0

  # ── Electrical sensors ─────────────────────────────────────────────────────
  sensor_battery_soc: "sensor.battery_state_of_capacity"
  sensor_battery_power: "sensor.battery_charge_discharge_power"
  sensor_grid_power: "sensor.acometida_general_power"

  # ── Solar forecast sensors ─────────────────────────────────────────────────
  sensor_solar_current_hour: "sensor.energy_current_hour"
  sensor_solar_next_hour: "sensor.energy_next_hour"
  sensor_solar_today: "sensor.energy_production_today"
  sensor_solar_tomorrow: "sensor.energy_production_tomorrow"

  # ── Temperature sensors ────────────────────────────────────────────────────
  sensor_temp_outdoor: "sensor.ebusd_broadcast_outsidetemp_temp2"
  sensor_temp_salon: "sensor.media_salon"

  # ── Pool pump ──────────────────────────────────────────────────────────────
  sensor_pool_hours_day: "sensor.depuradora_encendida_24h"
  sensor_pool_hours_week: "sensor.depuradora_encendida_semana"
  switch_pool: "switch.depuradora"

  # ── Pool cleaner (limpiafondos) — runs first 15 min with pool pump ─────────
  switch_pool_cleaner: "switch.limpiafondos"

  # ── Heat pump actuators ────────────────────────────────────────────────────
  number_hvac_cool: "number.ebusd_ctls2_z1coolingtemp_tempv"
  number_hvac_heat: "number.ebusd_ctls2_z1manualtemp_tempv"

  # ── Battery direct control (Huawei Luna2000) ───────────────────────────────
  number_battery_charge_cutoff: "number.battery_grid_charge_cutoff_soc"
  number_battery_charge_power: "a186f9599e9cad7127bca381f7a8bfb2"
  number_battery_backup_soc: "de4a2bf18222f354228cdb112b65e882"
  switch_battery_force_charge: "02db00e10018b01211507db92819a25a"
  select_battery_mode: "select.battery_working_mode"

  # ── Dishwasher ─────────────────────────────────────────────────────────────
  sensor_dishwasher_state: "sensor.lavavajillas_operation_state"
  switch_dishwasher: ""

  # ── Weather (AEMET OpenData) for storm protection ──────────────────────────
  sensor_weather: "weather.aemet"

  # ── Daily summary notifications ────────────────────────────────────────────
  notify_daily_time: "23:00"
  notify_email_service: "correo_gmail_com"
  notify_email_target: "scamposgarci@gmail.com"
  notify_telegram_service: "telegramsergio"

schema:
  decision_interval_minutes: int(5,60)
  retrain_cron: str
  log_level: "list(debug|info|warning|error)"
  summer_start_month: int(1,12)
  summer_end_month: int(1,12)
  solar_tomorrow_irrisoria_kwh: float
  battery_emergency_threshold: int(1,30)
  battery_low_threshold: int(10,50)
  battery_medium_threshold: int(30,80)
  battery_storm_threshold: int(50,100)
  battery_capacity_kwh: float
  sensor_battery_soc: str
  sensor_battery_power: str
  sensor_grid_power: str
  sensor_solar_current_hour: str
  sensor_solar_next_hour: str
  sensor_solar_today: str
  sensor_solar_tomorrow: str
  sensor_temp_outdoor: str
  sensor_temp_salon: str
  sensor_pool_hours_day: str
  sensor_pool_hours_week: str
  switch_pool: str
  switch_pool_cleaner: str
  number_hvac_cool: str
  number_hvac_heat: str
  number_battery_charge_cutoff: str
  number_battery_charge_power: str
  number_battery_backup_soc: str
  switch_battery_force_charge: str
  select_battery_mode: str
  sensor_dishwasher_state: str
  switch_dishwasher: str
  sensor_weather: str
  notify_daily_time: str
  notify_email_service: str
  notify_email_target: str
  notify_telegram_service: str
